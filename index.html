<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Notlarım — SQL / Git / Genel Kavramlar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d1117;
    --panel: #10151c;
    --card: #161c26;
    --card-hover: #1b2230;
    --border: #262e3a;
    --border-soft: #1d232e;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-faint: #5b6472;
    --sql: #58a6ff;
    --sql-dim: #1c3a5e;
    --git: #ef9f27;
    --git-dim: #4a3512;
    --genel: #bc8cff;
    --genel-dim: #3a2c5e;
    --done: #3fb950;
    --done-dim: #16321c;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:920px;margin:0 auto;padding:0 0 4rem;}

  /* ---- header / editor chrome ---- */
  .titlebar{
    display:flex;align-items:center;gap:8px;
    padding:14px 20px;border-bottom:1px solid var(--border);
    background:var(--panel);
  }
  .dot{width:11px;height:11px;border-radius:50%;}
  .dot.r{background:#ff5f56;}.dot.y{background:#ffbd2e;}.dot.g{background:#27c93f;}
  .titlebar .filename{
    margin-left:10px;font-family:var(--mono);font-size:13px;color:var(--text-dim);
  }

  .tabbar{
    display:flex;background:var(--panel);border-bottom:1px solid var(--border);
    overflow-x:auto;
  }
  .tab{
    display:flex;align-items:center;gap:8px;
    padding:12px 18px;font-family:var(--mono);font-size:13px;
    color:var(--text-faint);cursor:pointer;white-space:nowrap;
    border-right:1px solid var(--border-soft);
    border-bottom:2px solid transparent;
    background:transparent;
    transition:color .15s, background .15s;
  }
  .tab:hover{color:var(--text-dim);background:rgba(255,255,255,0.02);}
  .tab .tab-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
  .tab[data-cat="sql"] .tab-dot{background:var(--sql);}
  .tab[data-cat="git"] .tab-dot{background:var(--git);}
  .tab[data-cat="genel"] .tab-dot{background:var(--genel);}
  .tab.active{color:var(--text);background:var(--bg);}
  .tab.active[data-cat="sql"]{border-bottom-color:var(--sql);}
  .tab.active[data-cat="git"]{border-bottom-color:var(--git);}
  .tab.active[data-cat="genel"]{border-bottom-color:var(--genel);}
  .tab .tab-count{font-size:11px;color:var(--text-faint);}

  /* ---- toolbar ---- */
  .toolbar{
    display:flex;gap:12px;align-items:center;
    padding:16px 20px;flex-wrap:wrap;
  }
  .search-wrap{flex:1;min-width:200px;position:relative;}
  .search-wrap input{
    width:100%;background:var(--card);border:1px solid var(--border);
    color:var(--text);padding:9px 12px 9px 34px;border-radius:8px;
    font-family:var(--sans);font-size:14px;outline:none;
  }
  .search-wrap input:focus{border-color:var(--text-faint);}
  .search-wrap input::placeholder{color:var(--text-faint);}
  .search-icon{
    position:absolute;left:11px;top:50%;transform:translateY(-50%);
    color:var(--text-faint);font-size:14px;
  }
  .toolbar-btn{
    background:var(--card);border:1px solid var(--border);color:var(--text-dim);
    padding:9px 14px;border-radius:8px;font-family:var(--sans);font-size:13px;
    cursor:pointer;white-space:nowrap;
  }
  .toolbar-btn:hover{background:var(--card-hover);color:var(--text);}

  /* ---- progress ---- */
  .progress-block{padding:0 20px 4px;}
  .progress-label{
    display:flex;justify-content:space-between;font-size:12px;
    color:var(--text-dim);margin-bottom:6px;font-family:var(--mono);
  }
  .progress-track{
    height:6px;background:var(--border-soft);border-radius:4px;overflow:hidden;
  }
  .progress-fill{
    height:100%;border-radius:4px;transition:width .3s ease;
  }
  .progress-fill[data-cat="sql"]{background:var(--sql);}
  .progress-fill[data-cat="git"]{background:var(--git);}
  .progress-fill[data-cat="genel"]{background:var(--genel);}

  /* ---- section groups ---- */
  .group-title{
    margin:26px 20px 10px;font-family:var(--mono);font-size:12px;
    color:var(--text-faint);letter-spacing:.06em;text-transform:uppercase;
    display:flex;align-items:center;gap:8px;
  }
  .group-title::after{content:"";flex:1;height:1px;background:var(--border-soft);}

  .list{padding:0 20px;display:flex;flex-direction:column;gap:8px;}

  .item{
    background:var(--card);border:1px solid var(--border);border-radius:10px;
    overflow:hidden;
  }
  .item.done{border-color:var(--done-dim);}
  .item-head{
    display:flex;align-items:flex-start;gap:12px;
    padding:13px 14px;cursor:pointer;
  }
  .item-head:hover{background:var(--card-hover);}
  .check{
    flex:0 0 auto;width:19px;height:19px;border-radius:5px;
    border:1.5px solid var(--text-faint);margin-top:2px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;background:transparent;color:transparent;font-size:12px;
    transition:all .15s;
  }
  .item.done .check{background:var(--done);border-color:var(--done);color:#0d1117;}
  .item-main{flex:1;min-width:0;}
  .item-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .item-num{font-family:var(--mono);font-size:11px;color:var(--text-faint);}
  .item-title{font-size:14.5px;font-weight:500;color:var(--text);}
  .item.done .item-title{color:var(--text-dim);}
  .item-desc{font-size:13px;color:var(--text-dim);margin-top:4px;line-height:1.55;}
  .chev{
    flex:0 0 auto;color:var(--text-faint);font-size:12px;margin-top:4px;
    transition:transform .2s;
  }
  .item.open .chev{transform:rotate(90deg);}

  .item-body{
    max-height:0;overflow:hidden;transition:max-height .25s ease;
  }
  .item.open .item-body{max-height:3000px;}
  .item-body-inner{padding:0 14px 16px 45px;}

  .note{
    font-size:13px;color:var(--text-dim);line-height:1.6;margin:0 0 10px;
  }
  .note strong{color:var(--text);font-weight:500;}

  .code{
    background:#0a0e14;border:1px solid var(--border-soft);border-radius:7px;
    padding:10px 13px;font-family:var(--mono);font-size:12.5px;
    color:#a5d6ff;white-space:pre-wrap;word-break:break-word;
    margin:6px 0;line-height:1.6;
  }
  .code .kw{color:#ff7b72;}
  .cmdline{
    display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-soft);
    font-size:13px;align-items:baseline;flex-wrap:wrap;
  }
  .cmdline:last-child{border-bottom:none;}
  .cmd{font-family:var(--mono);color:#a5d6ff;font-size:12.5px;flex:0 0 auto;background:#0a0e14;padding:2px 7px;border-radius:5px;border:1px solid var(--border-soft);}
  .cmd-desc{color:var(--text-dim);font-size:12.5px;line-height:1.5;}

  .subtopic{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border-soft);}
  .subtopic-title{font-family:var(--mono);font-size:12.5px;color:var(--text);margin-bottom:6px;font-weight:500;}

  .flag{
    display:inline-flex;align-items:center;gap:5px;
    background:var(--git-dim);color:#ffb454;font-size:11.5px;
    padding:4px 9px;border-radius:6px;margin-top:8px;font-family:var(--sans);
  }

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--text-faint);
    font-size:13.5px;
  }

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}

  @media(max-width:600px){
    .item-body-inner{padding-left:14px;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="titlebar">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <span class="filename">calisma-rehberi — Malatya, İnönü Üniversitesi</span>
  </div>

  <div class="tabbar" id="tabbar">
    <div class="tab active" data-cat="sql"><span class="tab-dot"></span>sql_notlari.sql<span class="tab-count" id="count-sql"></span></div>
    <div class="tab" data-cat="git"><span class="tab-dot"></span>git_notlari.sh<span class="tab-count" id="count-git"></span></div>
    <div class="tab" data-cat="genel"><span class="tab-dot"></span>genel_kavramlar.md<span class="tab-count" id="count-genel"></span></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Bu sekmede ara... (örn. JOIN, stash, REST API)">
    </div>
    <button class="toolbar-btn" id="expand-all">Tümünü aç</button>
    <button class="toolbar-btn" id="collapse-all">Tümünü kapat</button>
  </div>

  <div class="progress-block">
    <div class="progress-label">
      <span id="progress-text">0 / 0 öğrenildi</span>
      <span id="progress-pct">%0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" data-cat="sql" style="width:0%"></div></div>
  </div>

  <div id="content"></div>

</div>

<script>
const DATA = {
  sql: [
    {t:"SQL Home / SQL Intro", d:"SQL, veritabanına erişmek ve veriyi yönetmek için kullanılan sorgu dilidir.", body:[
      {p:"Açılımı: <strong>S</strong>tructured <strong>Q</strong>uery <strong>L</strong>anguage."}
    ]},
    {t:"SQL Syntax", d:"SQL komutları genelde İngilizce kelimelere benzeyen anahtar kelimelerden oluşur. Büyük/küçük harf duyarlılığı yoktur.", body:[
      {p:"En önemli SQL komutları:"},
      {cmds:[
        ["SELECT","Veri çeker"],["UPDATE","Veri günceller"],["DELETE","Veri siler"],
        ["INSERT INTO","Veri ekler"],["CREATE DATABASE","Veritabanı oluşturur"],
        ["ALTER DATABASE","Veritabanı değiştirir"],["CREATE TABLE","Tablo oluşturur"],
        ["ALTER TABLE","Tablo değiştirir"],["DROP TABLE","Tablo siler"],
        ["CREATE INDEX","Index oluşturur"],["DROP INDEX","Index siler"]
      ]}
    ]},
    {t:"SQL SELECT", d:"Tablodan veri çekmek için kullanılır.", body:[
      {code:"SELECT CustomerName, City\nFROM Customers;"},
      {p:"Tüm sütunları seçmek için:"},
      {code:"SELECT * FROM Customers;"}
    ]},
    {t:"SQL SELECT DISTINCT", d:"Tekrarlanan değerleri kaldırır. Sadece benzersiz değerleri getirir.", body:[
      {code:"SELECT DISTINCT Country\nFROM Customers;"}
    ]},
    {t:"SQL WHERE", d:"Verileri şarta göre filtreler. WHERE sadece SELECT içinde değil; UPDATE ve DELETE içinde de kullanılır.", body:[
      {p:"Metinsel değerlerde tek tırnak kullanılır, sayısal değerlerde tırnak gerekmez."},
      {code:"SELECT * FROM Customers WHERE Country = 'Mexico';"},
      {code:"SELECT * FROM Customers WHERE CustomerID > 80;"}
    ]},
    {t:"SQL ORDER BY", d:"Sonuçları sıralar. Varsayılan sıralama A'dan Z'ye şeklindedir.", body:[
      {code:"SELECT * FROM Customers\nORDER BY Country;"},
      {p:"Azalan sıralama:"},
      {code:"SELECT * FROM Customers\nORDER BY Country DESC;"},
      {p:"Birden fazla sütuna göre sıralama:"},
      {code:"SELECT * FROM Customers\nORDER BY Country ASC, CustomerName DESC;"}
    ]},
    {t:"SQL AND", d:"Birden fazla şart, hepsi doğruysa kayıt gelir.", body:[
      {code:"SELECT * FROM Customers\nWHERE Country = 'Germany' AND City = 'Berlin';"}
    ]},
    {t:"SQL OR", d:"Şartlardan en az biri doğruysa kayıt gelir.", body:[
      {code:"SELECT * FROM Customers\nWHERE City = 'Berlin' OR City = 'Adana01';"}
    ]},
    {t:"SQL NOT", d:"Şartın tersini alır.", body:[
      {code:"SELECT * FROM Customers\nWHERE NOT Country = 'Germany';"}
    ]},
    {t:"SQL INSERT INTO", d:"Tabloya yeni kayıt ekler.", body:[
      {p:"Tüm sütunlara değer girilecekse sütun isimleri yazılmadan da olur:"},
      {code:"INSERT INTO Customers\nVALUES (92, 'Ersin Market', 'Ersin Genc');"}
    ]},
    {t:"SQL NULL Values", d:"NULL, boş ya da bilinmeyen değer demektir.", body:[
      {p:"NULL kontrolünde <strong>\"=\"</strong> kullanılmaz. IS NULL ya da IS NOT NULL kullanılır."},
      {code:"SELECT * FROM Customers\nWHERE Address IS NULL;"}
    ]},
    {t:"SQL UPDATE", d:"Var olan kayıtları günceller.", body:[
      {p:"<strong>WHERE yazılmazsa tüm tablo güncellenir!</strong> WHERE mutlaka yazılmalı."},
      {code:"UPDATE Customers\nSET ContactName = 'Ersin', City = 'Malatya'\nWHERE CustomerID = 1;"}
    ]},
    {t:"SQL DELETE", d:"Kayıt siler. WHERE yazılmazsa tüm tablo silinebilir.", body:[
      {code:"DELETE FROM Customers\nWHERE CustomerName = 'Ersin market';"},
      {p:"Tüm kayıtları silmek için:"},
      {code:"DELETE FROM Customers;"}
    ]},
    {t:"SQL SELECT TOP / LIMIT", d:"Belirli sayıda kayıt getirir. Veritabanına göre yazımı değişir.", body:[
      {p:"SQL Server:"},{code:"SELECT TOP 3 * FROM Customers;"},
      {p:"MySQL:"},{code:"SELECT * FROM Customers LIMIT 3;"}
    ]},
    {t:"SQL Aggregate Functions", d:"Toplama / özet hesaplama yapan fonksiyonlardır. Genelde COUNT, SUM, AVG, MIN, MAX kullanılır.", body:[
      {sub:"MIN() — en küçük değeri getirir", code:"SELECT MIN(price) FROM products;"},
      {sub:"MAX() — en büyük değeri getirir", code:"SELECT MAX(price) FROM Customers;"},
      {sub:"COUNT() — satır sayısını sayar", code:"SELECT COUNT(CustomerId) FROM Customers;"},
      {sub:"SUM() — sayısal sütundaki değerleri toplar", code:"SELECT SUM(Quantity) FROM OrderDetails;"},
      {sub:"AVG() — ortalama hesaplar", code:"SELECT AVG(price) FROM products;"}
    ]},
    {t:"SQL LIKE", d:"Metin içinde arama yapmak için kullanılır.", body:[
      {code:"SELECT * FROM customers\nWHERE customername LIKE 'a%';"},
      {p:"→ Bu, adı <strong>a ile başlayan</strong> müşterileri getirir."},
      {p:"→ <strong>'%a'</strong> → adı a ile biten müşteriler."},
      {p:"→ <strong>'%er%'</strong> → adının içinde \"er\" geçen müşteriler."}
    ]},
    {t:"SQL Wildcards", d:"% → sıfır, bir veya daha fazla karakter. _ → tek karakter.", body:[
      {code:"SELECT * FROM customers\nWHERE city LIKE 'L_n_on';"},
      {p:"Bu kullanımda her \"_\" tek karakterlik bir boşluğu temsil eder."}
    ]},
    {t:"SQL IN", d:"Bir sütunun birden fazla olası değerden birine eşit olmasını kontrol eder.", body:[
      {code:"SELECT * FROM Customers\nWHERE Country IN ('Türkiye', 'Adana01', 'TR');"},
      {p:"NOT IN → dışlama yapılır:"},
      {code:"SELECT * FROM Customers\nWHERE Country NOT IN ('Türkiye', 'Adana01', 'TR');"}
    ]},
    {t:"SQL BETWEEN", d:"İki değer arasındaki kayıtları getirir. Başlangıç ve bitiş değerleri genelde dahildir.", body:[
      {code:"SELECT * FROM products\nWHERE price BETWEEN 10 AND 20;"}
    ]},
    {t:"SQL Aliases", d:"Sütuna veya tabloya geçici isim verir. AS kullanılır.", body:[
      {p:"Sütun alias:"},
      {code:"SELECT CustomerName AS customer\nFROM Customers;"},
      {p:"Tablo alias örneği:"},
      {code:"SELECT c.CustomerName, o.OrderId\nFROM Customers AS c, Orders AS o\nWHERE c.CustomerID = o.CustomerID;"}
    ]},
    {t:"SQL JOINS", d:"JOIN, iki veya daha fazla tabloyu ilişkili sütunlara göre birleştirir.", body:[
      {sub:"INNER JOIN — iki tabloda da eşleşen kayıtları getirir", code:"SELECT Orders.OrderID, Customers.CustomerName, Orders.OrderDate\nFROM Orders\nINNER JOIN Customers ON Orders.CustomerID = Customers.CustomerID;"},
      {sub:"LEFT JOIN — sol tablodaki tüm kayıtları getirir, sağda eşleşme varsa ekler", code:"SELECT Customers.CustomerName, Orders.OrderID\nFROM Customers\nLEFT JOIN Orders ON Customers.CustomerID = Orders.CustomerID;"},
      {sub:"RIGHT JOIN — sağ tablodaki tüm kayıtları getirir, solda eşleşme varsa ekler", code:"SELECT Orders.OrderID, Employees.LastName\nFROM Orders\nRIGHT JOIN Employees ON Orders.EmployeeID = Employees.EmployeeID;"},
      {sub:"FULL JOIN — sağda veya solda eşleşme olsun olmasın iki taraftaki kayıtları getirir", code:"SELECT Customers.CustomerName, Orders.OrderID\nFROM Customers\nFULL OUTER JOIN Orders ON Customers.CustomerID = Orders.CustomerID;"},
      {sub:"SELF JOIN — bir tabloyu kendisiyle join etmek; aynı tablodaki kayıtları karşılaştırır", flag:"Bu konuyu tam anlamadım — tekrar çalışılacak"}
    ]},
    {t:"SQL UNION", d:"İki sorgunun sonucunu birleştirir. Tekrarları kaldırır.", body:[
      {code:"SELECT City FROM Customers\nUNION\nSELECT City FROM Suppliers;"}
    ]},
    {t:"SQL UNION ALL", d:"İki sorgunun sonucunu birleştirir ama tekrarları silmez.", body:[
      {code:"SELECT City FROM Customers\nUNION ALL\nSELECT City FROM Suppliers;"}
    ]},
    {t:"SQL GROUP BY", d:"Aynı değerlere sahip satırları gruplar. Genelde COUNT, MAX, MIN, SUM, AVG ile beraber kullanılır.", body:[
      {code:"SELECT Country, COUNT(CustomerID) AS [Number of Customers]\nFROM Customers\nGROUP BY Country;"}
    ]},
    {t:"SQL HAVING", d:"WHERE normal satırları filtreler; HAVING gruplanmış sonuçları filtreler.", body:[
      {code:"SELECT Country, COUNT(CustomerID)\nFROM Customers\nGROUP BY Country\nHAVING COUNT(CustomerID) > 5;"}
    ]},
    {t:"SQL EXISTS", d:"Alt sorguda kayıt var mı diye kontrol eder. Varsa TRUE döner.", body:[
      {p:"Genelde WHERE EXISTS (alt sorgu) şeklinde, bir kaydın başka bir tabloda karşılığı var mı diye bakmak için kullanılır."}
    ]},
    {t:"SQL ANY", d:"Alt sorgudan gelen değerlerden herhangi biri koşulu sağlıyorsa çalışır.", body:[
      {p:"WHERE sütun = ANY (alt sorgu) gibi kullanımlarda, alt sorgunun döndürdüğü değerlerden en az biriyle eşleşme aranır."}
    ]}

  git: [

      {p:"Working Directory (Dosya) → <strong>git add</strong> → Staging Area → <strong>git commit</strong> → Local Repository → <strong>git push</strong> → Remote Repository"},
      {cmds:[

        ["git push","Yereldeki commit'leri GitHub'a gönderir"],
        ["git pull","Değişiklikleri kendi bilgisayarına çeker"],
        ["git --version","Git kurulu mu, kuruluysa hangi sürüm var, gösterir"]
      ]}
    ]},
    {t:"Git Get Started", d:"Bir klasörü Git projesine çevirmek.", body:[
      {cmds:[
        ["git init","Bulunduğun klasörü Git projesine çevirir. İçine gizli .git klasörü açılır; git geçmişi ve takip bilgileri burada tutulur"],

    ]},
    {t:"Git New Files", d:"Yeni dosya oluşturulduğunda Git onu hemen takip etmez, önce durumuna bakılır.", body:[
      {cmds:[

    ]},
    {t:"Git Staging", d:"Staging, commit'e girecekleri hazırlama alanıdır.", body:[
      {cmds:[
        ["git add index.html","Sadece index.html dosyasını stage alanına alır"],
        ["git add --all","Tüm değişiklikleri stage alanına alır"],

        ["git status","Hangi dosyalar stage edilmiş, hangileri edilmemiş gösterir"],

    {t:"Git Commit", d:"Commit, projenin o anki halinin kayıt noktasıdır.", body:[
      {cmds:[
        ["git commit -m \"mesaj\"","Stage alanındaki dosyaları commit olarak kaydeder"],
        ["git commit -a -m \"mesaj\"","Takip edilen dosyalardaki değişiklikleri direkt commit eder. Yeni oluşturulmuş (untracked) dosyaları otomatik eklemez"],

        ["git log","Commit geçmişini gösterir"],
        ["git commit --allow-empty -m \"Trigger build\"","Hiç dosya değişikliği olmasa bile boş commit oluşturur"],

    {t:"Git Tagging", d:"Tag genelde sürüm işaretlemek için kullanılır.", body:[
      {cmds:[

let progress = {sql:{}, git:{}, genel:{}};
let activeTab = "sql";
let openItems = new Set();

async function loadProgress(){
  try{
    const r = await window.storage.get('ders-notlari-progress');
    if(r && r.value){ progress = JSON.parse(r.value); }
  }catch(e){ /* no saved progress yet */ }
}
async function saveProgress(){
  try{ await window.storage.set('ders-notlari-progress', JSON.stringify(progress)); }
  catch(e){ /* ignore */ }
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBody(item){
  if(!item.body || item.body.length===0) return "";
  let html = "";
  item.body.forEach(b=>{
    if(b.p){ html += `<p class="note">${b.p}</p>`; }
    if(b.code){ html += `<div class="code">${escapeHtml(b.code)}</div>`; }
    if(b.cmds){
      html += `<div>`;
      b.cmds.forEach(c=>{
        html += `<div class="cmdline"><span class="cmd">${escapeHtml(c[0])}</span><span class="cmd-desc">${escapeHtml(c[1])}</span></div>`;
      });
      html += `</div>`;
    }
    if(b.sub){
      html += `<div class="subtopic"><div class="subtopic-title">${escapeHtml(b.sub)}</div>`;
      if(b.code){ html += `<div class="code">${escapeHtml(b.code)}</div>`; }
      if(b.flag){ html += `<div class="flag">🚩 ${escapeHtml(b.flag)}</div>`; }
      html += `</div>`;
    }
    if(b.flag && !b.sub){ html += `<div class="flag">🚩 ${escapeHtml(b.flag)}</div>`; }
  });
  return html;
}

function render(){
  const cat = activeTab;
  const items = DATA[cat];
  const q = document.getElementById('search').value.trim().toLowerCase();
  const container = document.getElementById('content');

  const filtered = items
    .map((it,idx)=>({it, idx}))
    .filter(({it})=>{
      if(!q) return true;
      const hay = (it.t + " " + it.d + " " + JSON.stringify(it.body||"")).toLowerCase();
      return hay.includes(q);
    });

  let html = `<div class="group-title">${cat==='sql'?'SQL Konuları':cat==='git'?'Git Konuları':'Genel Yazılım Kavramları'}</div><div class="list">`;

  if(filtered.length===0){
    html += `<div class="empty-state">"${escapeHtml(q)}" için sonuç bulunamadı.</div>`;
  } else {
    filtered.forEach(({it, idx})=>{
      const key = idx;
      const done = !!progress[cat][key];
      const isOpen = openItems.has(cat+"-"+key);
      html += `
      <div class="item ${done?'done':''} ${isOpen?'open':''}" data-key="${key}">
        <div class="item-head" data-toggle="${key}">
          <div class="check" data-check="${key}">${done?'✓':''}</div>
          <div class="item-main">
            <div class="item-title-row">
              <span class="item-num">${String(idx+1).padStart(2,'0')}</span>
              <span class="item-title">${escapeHtml(it.t)}</span>
            </div>
            <div class="item-desc">${escapeHtml(it.d)}</div>
          </div>
          <div class="chev">▶</div>
        </div>
        <div class="item-body"><div class="item-body-inner">${renderBody(it)}</div></div>
      </div>`;
    });
  }
  html += `</div>`;
  container.innerHTML = html;

  container.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      if(e.target.closest('[data-check]')) return;
      const key = el.getAttribute('data-toggle');
      const id = cat+"-"+key;
      if(openItems.has(id)) openItems.delete(id); else openItems.add(id);
      render();
    });
  });
  container.querySelectorAll('[data-check]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const key = el.getAttribute('data-check');
      progress[cat][key] = !progress[cat][key];
      saveProgress();
      render();
      updateProgressBar();
    });
  });

  updateTabCounts();
  updateProgressBar();
}

function updateTabCounts(){
  ["sql","git","genel"].forEach(cat=>{
    const total = DATA[cat].length;
    const done = Object.values(progress[cat]).filter(Boolean).length;
    document.getElementById('count-'+cat).textContent = ` ${done}/${total}`;
  });
}

function updateProgressBar(){
  const cat = activeTab;
  const total = DATA[cat].length;
  const done = Object.values(progress[cat]).filter(Boolean).length;
  const pct = total? Math.round((done/total)*100) : 0;
  document.getElementById('progress-text').textContent = `${done} / ${total} öğrenildi`;
  document.getElementById('progress-pct').textContent = `%${pct}`;
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + "%";
  fill.setAttribute('data-cat', cat);
}

document.getElementById('tabbar').addEventListener('click',(e)=>{
  const tab = e.target.closest('.tab');
  if(!tab) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  activeTab = tab.getAttribute('data-cat');
  document.getElementById('search').value = "";
  render();
});

document.getElementById('search').addEventListener('input', render);

document.getElementById('expand-all').addEventListener('click',()=>{
  DATA[activeTab].forEach((_,idx)=> openItems.add(activeTab+"-"+idx));
  render();
});
document.getElementById('collapse-all').addEventListener('click',()=>{
  DATA[activeTab].forEach((_,idx)=> openItems.delete(activeTab+"-"+idx));
  render();
});

(async function init(){
  await loadProgress();
  render();
})();
</script>
